<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" type="text/css" href="../CSS/product-detail.css">
    <link rel="stylesheet" type="text/css" href="../CSS/header.css">
    <link rel="stylesheet" type="text/css" href="../CSS/footer.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <!-- Header động -->
    <div id="header"></div>

    <!-- Khung chi tiết sản phẩm sẽ được điền tự động bằng Javascript -->
    <main class="detail-container" id="product-detail-content">
        <div style="text-align: center; width: 100%; padding: 50px 0; color: #666;">
            <p>Đang tải thông tin chi tiết sản phẩm...</p>
        </div>
    </main>

    <!-- Khung bình luận và đánh giá sản phẩm -->
    <section class="detail-container reviews-wrapper" id="reviews-container" style="flex-direction: column; gap: 20px; margin-top: 20px; margin-bottom: 50px;">
        <div style="text-align: center; width: 100%; padding: 20px 0; color: #666;">
            <p>Đang tải bình luận và đánh giá...</p>
        </div>
    </section>

    <!-- Footer -->
    <footer style="text-align: center; padding: 20px; background-color: #ffffff; border-top: 1px solid #eee; margin-top: 50px;">
        <h1>Liên hệ với chúng tôi</h1>
        <ul style="display: flex; justify-content: center; list-style: none; gap: 15px; padding: 0;">
            <li><a href="https://www.facebook.com/djd.jd.94695/" target="_blank"><img src="../images/facebook.png" alt="Facebook" style="height: 24px;"></a></li>
            <li><a href="https://www.tiktok.com/@laiduc55" target="_blank"><img src="../images/tik-tok.png" alt="Tiktok" style="height: 24px;"></a></li>
            <li><a href="https://www.instagram.com/laithaiduc/" target="_blank"><img src="../images/instagram.png" alt="Instagram" style="height: 24px;"></a></li>
        </ul>
    </footer>

    <!-- Scripts -->
    <script src="../JS/main.js"></script>
    <script src="../JS/product-detail.js"></script>
</body>
</html>
