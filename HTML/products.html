<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" type="text/css" href="../CSS/products.css">
    <link rel="stylesheet" type="text/css" href="../CSS/header.css">
    <link rel="stylesheet" type="text/css" href="../CSS/footer.css">
    <script src="../JS/main.js" defer></script>
    <script src="../JS/products.js" defer></script>
</head>

<body>
    <!-- Header động -->
    <div id="header"></div>
    <div class="introduce">
        <h1>Sản phẩm của chúng tôi</h1>
        <p>Chào mừng bạn đến với trang danh sách sản phẩm!</p>
    </div>
    <div class="select">
        <div class="custom-select" id="filter-brand">
            <div class="select-trigger">
                <span>Tất cả Hãng</span>
            </div>
            <div class="custom-options">
                <div class="custom-option selected" data-value="">Tất cả Hãng</div>
                <div class="custom-option" data-value="Nike">Nike</div>
                <div class="custom-option" data-value="Adidas">Adidas</div>
                <div class="custom-option" data-value="Puma">Puma</div>
                <div class="custom-option" data-value="Khác">Khác</div>
            </div>
        </div>
        
        <div class="custom-select" id="filter-price">
            <div class="select-trigger">
                <span>Tất cả Mức giá</span>
            </div>
            <div class="custom-options">
                <div class="custom-option selected" data-value="">Tất cả Mức giá</div>
                <div class="custom-option" data-value="under1">Dưới 1 triệu</div>
                <div class="custom-option" data-value="1to3">1 - 3 triệu</div>
                <div class="custom-option" data-value="over3">Trên 3 triệu</div>
            </div>
        </div>

        <div class="custom-select" id="filter-size">
            <div class="select-trigger">
                <span>Tất cả Kích cỡ</span>
            </div>
            <div class="custom-options">
                <div class="custom-option selected" data-value="">Tất cả Kích cỡ</div>
                <div class="custom-option" data-value="39">Size 39</div>
                <div class="custom-option" data-value="40">Size 40</div>
                <div class="custom-option" data-value="41">Size 41</div>
                <div class="custom-option" data-value="42">Size 42</div>
                <div class="custom-option" data-value="43">Size 43</div>
                <div class="custom-option" data-value="44">Size 44</div>
                <div class="custom-option" data-value="45">Size 45</div>
            </div>
        </div>
    </div>
    <div class="product-section">
        <div id="product-list" class="product-container"></div>
    </div>
    <footer>
        <h1>Liên hệ với chúng tôi</h1>
        <ul>
            <li><a href="https://www.facebook.com/djd.jd.94695/" target="_blank"><img src="../images/facebook.png"
                        alt="Facebook"> </a></li>
            <li><a href="https://www.tiktok.com/@laiduc55" target="_blank"><img src="../images/tik-tok.png"
                        alt="Tiktok"> </a>
            </li>
            <li><a href="https://www.instagram.com/laithaiduc/" target="_blank"><img src="../images/instagram.png"
                        alt="Instagram">
                </a></li>
        </ul>
    </footer>
</body>

</html>
